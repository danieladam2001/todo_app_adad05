<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title><%= todo.title %> – Todo detail</title>
  </head>
  <body>
    <p><a href="/">&larr; Zpět na seznam</a></p>

    <div id="todo_detail"><%- include('_todo_detail.html') %></div>

    <hr />

    <fieldset>
      <legend><strong>Upravit název úkolu</strong></legend>
      <form method="post" action="/update-todo/<%= todo.id %>">
        <label for="title">Nový název:</label>
        <br />
        <input id="title" name="title" size="40" value="<%= todo.title %>" />
        <br />
        <label>Priorita:</label>
        <br />
        <select name="priority">
          <option value="low" <%= todo.priority === 'low' ? 'selected' : '' %>>Nízká</option>
          <option value="medium" <%= todo.priority === 'medium' ? 'selected' : '' %>>Střední</option>
          <option value="high" <%= todo.priority === 'high' ? 'selected' : '' %>>Vysoká</option>
        </select>
        <button type="submit">&#10003; Uložit</button>
      </form>
    </fieldset>

    <script>
      const ws = new WebSocket('ws://localhost:3000/ws')

      ws.addEventListener('message', (ev) => {

        const path = window.location.pathname;
        const match = path.match(/\/todo\/(\d+)/);
        const todoId = Number(match[1]);
        console.log(todoId);

        const json = JSON.parse(ev.data)
        console.log("type", json.type)
        // console.log(todoId)
        // console.log("update_todo_detailu",json.todo_id === todoId,json.type === 'todo_detail')
        // console.log("delete_todo_detailu",json.todo_id === todoId,json.type === 'todo_detail_deleted')
        if (json.type === 'todo_detail' & json.todo_id === todoId) {
          console.log("a");
          document.getElementById('todo_detail').innerHTML = json.html
        } else if (json.type === 'todo_detail_deleted' & json.todo_id === todoId){
          console.log("b");
          window.location.href = '/todo-delete';
        } else {
          console.log("c")
        }
      })
    </script>

  </body>
</html>
